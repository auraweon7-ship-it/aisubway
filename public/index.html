<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 지하철 AI 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
.leaflet-div-icon{background:transparent!important;border:none!important;}
:root{
  --bg:#060a14;--bg2:#0c1220;--surface:#0f1929;--surface2:#151f30;--surface3:#1c2840;
  --border:rgba(99,179,237,.1);--border2:rgba(99,179,237,.18);
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#34d399;
  --text:#e2eaf6;--text2:#94a3b8;--text3:#4a5a72;
  --red:#f87171;--yellow:#fbbf24;--green:#34d399;--orange:#fb923c;
  --line1:#3b5bdb;--line2:#2f9e44;--line3:#e8590c;--line4:#4dabf7;
  --line5:#9c36b5;--line6:#d9480f;--line7:#5c940d;--line8:#e03131;--line9:#e67700;
  --glow:0 0 20px rgba(56,189,248,.15);
  --card-shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Pretendard','Noto Sans KR',sans-serif;
  min-height:100vh;overflow-x:hidden;
}

/* 배경 효과 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%,rgba(56,189,248,.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(129,140,248,.05) 0%,transparent 60%),
    linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,32px 32px,32px 32px;
}

.app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:16px 20px}

/* ── TOP NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;margin-bottom:16px;
  background:rgba(15,25,41,.85);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:16px;
  box-shadow:var(--card-shadow);
}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 16px rgba(56,189,248,.3);
}
.nav-title{font-size:16px;font-weight:800;letter-spacing:-.4px}
.nav-title span{color:var(--accent)}
.nav-sub{font-size:10px;color:var(--text2);font-weight:500;margin-top:1px}
.nav-right{display:flex;align-items:center;gap:12px}
.live-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  color:var(--green);letter-spacing:.1em;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
#clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);letter-spacing:.08em}
.theme-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all .2s;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── SEARCH BAR ── */
.search-section{
  display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px;
}
.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:10px 16px;transition:all .25s;position:relative;
}
.search-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(56,189,248,.12),var(--glow);
}
.search-wrap svg{color:var(--text3);flex-shrink:0}
.search-wrap input{
  background:none;border:none;outline:none;width:100%;
  font-size:14px;font-family:'Pretendard',sans-serif;color:var(--text);
}
.search-wrap input::placeholder{color:var(--text3)}
#searchBtn{
  background:linear-gradient(135deg,var(--accent),#0ea5e9);
  color:#000;border:none;border-radius:8px;padding:7px 18px;
  font-size:12px;font-weight:800;cursor:pointer;
  font-family:'Pretendard',sans-serif;white-space:nowrap;
  transition:all .2s;box-shadow:0 0 12px rgba(56,189,248,.25);
}
#searchBtn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(56,189,248,.4)}
#searchBtn:active{transform:translateY(0)}

/* 검색 자동완성 */
.autocomplete{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
  overflow:hidden;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);
  display:none;
}
.autocomplete.show{display:block}
.ac-item{
  padding:10px 16px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background .15s;border-bottom:1px solid var(--border);
}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(56,189,248,.08)}
.ac-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ac-name{font-weight:600}
.ac-line{font-size:11px;color:var(--text2)}

/* 호선 필터 */
.line-filters{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;
}
.line-filters::-webkit-scrollbar{display:none}
.lf-label{font-size:10px;color:var(--text3);font-weight:700;white-space:nowrap;letter-spacing:.05em}
.lf-btn{
  flex-shrink:0;padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;cursor:pointer;
  border:2px solid transparent;color:#fff;
  font-family:'Pretendard',sans-serif;transition:all .2s;
  opacity:.45;
}
.lf-btn.on{border-color:rgba(255,255,255,.7);opacity:1;box-shadow:0 0 10px rgba(255,255,255,.2)}
.lf-btn:hover{opacity:.85}
.lb1{background:var(--line1)}.lb2{background:var(--line2)}.lb3{background:var(--line3)}
.lb4{background:var(--line4)}.lb5{background:var(--line5)}.lb6{background:var(--line6)}
.lb7{background:var(--line7)}.lb8{background:var(--line8)}.lb9{background:var(--line9)}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;position:relative;overflow:hidden;
  transition:transform .2s,border-color .25s,box-shadow .25s;cursor:default;
}
.kpi:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--card-shadow),var(--glow)}
.kpi::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0;
}
.kpi.k1::after{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi.k2::after{background:linear-gradient(90deg,var(--green),#059669)}
.kpi.k3::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.k4::after{background:linear-gradient(90deg,var(--accent2),#ec4899)}
.kpi.k5::after{background:linear-gradient(90deg,var(--red),#dc2626)}
.kpi-icon{font-size:18px;margin-bottom:8px;display:block}
.kpi-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.kpi.k1 .kpi-val{color:var(--accent)}
.kpi.k2 .kpi-val{color:var(--green)}
.kpi.k3 .kpi-val{color:var(--yellow)}
.kpi.k4 .kpi-val{color:var(--accent2)}
.kpi.k5 .kpi-val{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px}
.kpi-badge{
  position:absolute;top:14px;right:14px;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
}
.badge-up{background:rgba(52,211,153,.15);color:var(--green)}
.badge-dn{background:rgba(248,113,113,.15);color:var(--red)}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:12px}
.left-col{display:flex;flex-direction:column;gap:12px}

/* 카드 공통 */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:rgba(21,31,48,.6);
}
.card-title{
  font-size:12px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.1em;
  display:flex;align-items:center;gap:7px;
}
.card-title .dot{width:6px;height:6px;border-radius:50%}

/* ── MAP ── */
#map{height:840px}
.map-overlay{
  position:absolute;bottom:12px;left:12px;z-index:999;
  display:flex;flex-direction:column;gap:6px;
}
.map-btn{
  background:rgba(15,25,41,.9);backdrop-filter:blur(10px);
  border:1px solid var(--border2);border-radius:8px;
  padding:6px 12px;font-size:11px;font-weight:600;
  color:var(--text);cursor:pointer;transition:all .2s;
  font-family:'Pretendard',sans-serif;white-space:nowrap;
}
.map-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Leaflet 다크 */
.leaflet-container{background:#06090f!important}
.leaflet-tile{filter:brightness(.38) saturate(.3) hue-rotate(195deg)}
.leaflet-control-zoom a{
  background:var(--surface2)!important;color:var(--text)!important;
  border-color:var(--border)!important;
}
.leaflet-control-attribution{
  background:rgba(6,10,20,.85)!important;color:var(--text3)!important;font-size:9px!important;
}
.leaflet-popup-content-wrapper{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border2);border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.6),var(--glow);
}
.leaflet-popup-tip{background:var(--surface2)}
.leaflet-popup-content{margin:14px 16px;font-family:'Pretendard',sans-serif}

/* ── 도착 테이블 ── */
.arrival-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.arrival-title{font-size:14px;font-weight:700}
.arrival-title em{font-style:normal;color:var(--accent)}
.refresh-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);cursor:pointer;transition:all .2s;
  font-family:'Pretendard',sans-serif;
}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

table{width:100%;border-collapse:collapse}
thead th{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text3);
  padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;
  background:rgba(21,31,48,.5);
}
tbody tr{animation:rowIn .3s ease forwards;opacity:0;transition:background .15s}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
tbody tr:nth-child(1){animation-delay:.03s}tbody tr:nth-child(2){animation-delay:.06s}
tbody tr:nth-child(3){animation-delay:.09s}tbody tr:nth-child(4){animation-delay:.12s}
tbody tr:nth-child(5){animation-delay:.15s}tbody tr:nth-child(6){animation-delay:.18s}
tbody tr:nth-child(7){animation-delay:.21s}tbody tr:nth-child(8){animation-delay:.24s}
tbody tr:hover{background:rgba(56,189,248,.05)}
tbody td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}

.line-circle{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:800;color:#fff;
}
.arrive-chip{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;white-space:nowrap;
}
.ac-soon{background:rgba(248,113,113,.15);color:var(--red)}
.ac-close{background:rgba(251,191,36,.12);color:var(--yellow)}
.ac-ok{background:rgba(52,211,153,.1);color:var(--green)}
.ac-arrive{background:rgba(248,113,113,.25);color:var(--red);animation:blink .7s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.status-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sp-run{background:rgba(52,211,153,.12);color:var(--green)}
.sp-in{background:rgba(56,189,248,.12);color:var(--accent)}
.sp-arr{background:rgba(248,113,113,.15);color:var(--red)}

/* ── RIGHT COL ── */
.right-col{display:flex;flex-direction:column;gap:12px}
.section-hd{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.section-hd::after{content:'';flex:1;height:1px;background:var(--border)}

/* 역 정보 카드 */
.station-hero{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.station-badge{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 0 16px rgba(0,0,0,.4);
}
.station-nm{font-size:18px;font-weight:800;letter-spacing:-.4px}
.station-line{font-size:11px;color:var(--text2);margin-top:2px}
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;
}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text2);font-size:11px}
.info-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px}

/* 즐겨찾기 & 빠른 검색 */
.fav-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fav-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;cursor:pointer;transition:all .2s;
  font-family:'Pretendard',sans-serif;text-align:left;position:relative;overflow:hidden;
}
.fav-btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(56,189,248,.1),transparent);
  transition:opacity .2s;
}
.fav-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
.fav-btn:hover::before{opacity:1}
.fav-nm{font-size:12px;font-weight:700;color:var(--text);display:block}
.fav-ln{font-size:10px;color:var(--text3);margin-top:1px;display:block}
.fav-star{position:absolute;top:8px;right:8px;font-size:10px;cursor:pointer;opacity:.4;transition:opacity .2s}
.fav-star.active{opacity:1}

/* ── 혼잡도 패널 ── */
.cong-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px}
.cong-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.tab-row{display:flex;gap:3px;background:var(--surface2);border-radius:8px;padding:3px}
.tab{
  padding:4px 14px;border-radius:6px;font-size:11px;font-weight:700;
  cursor:pointer;border:none;background:transparent;color:var(--text2);
  font-family:'Pretendard',sans-serif;transition:all .2s;
}
.tab.on{background:var(--accent);color:#000}
.tab:hover:not(.on){background:rgba(255,255,255,.06);color:var(--text)}

.cong-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px}
.cong-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px;transition:all .2s;
}
.cong-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cc-name{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700}
.cc-dot{width:9px;height:9px;border-radius:50%}
.cc-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px}
.cb-smooth{background:rgba(52,211,153,.15);color:var(--green)}
.cb-normal{background:rgba(251,191,36,.12);color:var(--yellow)}
.cb-busy{background:rgba(248,113,113,.13);color:var(--red)}
.cb-jam{background:rgba(248,113,113,.22);color:#ff3333;animation:blink .9s ease-in-out infinite}
.bar-bg{height:4px;background:rgba(255,255,255,.07);border-radius:10px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:10px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.cc-bot{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.cc-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px}

/* 시간대 차트 */
.time-chart-wrap{padding:16px}
.tc-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:10px}
.tc-bars{display:flex;align-items:flex-end;gap:2px;height:72px}
.tc-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:3px}
.tc-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;cursor:pointer;transition:filter .2s}
.tc-bar:hover{filter:brightness(1.4)}
.tc-tick{font-size:8px;color:var(--text3)}
.tc-col.now .tc-bar{outline:2px solid rgba(255,255,255,.6);outline-offset:1px}
.tc-col.now .tc-tick{color:var(--accent);font-weight:700}
.tc-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:10px;color:var(--text2)}

/* 게이지 */
.gauge-wrap{display:flex;align-items:center;gap:14px;padding:14px 16px}
.gauge-svg-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.gauge-svg-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.gauge-bg-c{fill:none;stroke:rgba(255,255,255,.07);stroke-width:7}
.gauge-fill-c{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1),stroke .3s}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-pct{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:900;line-height:1}
.gauge-lbl{font-size:9px;color:var(--text3);margin-top:2px}
.gauge-info{flex:1}
.gi-title{font-size:14px;font-weight:800;margin-bottom:6px}
.gi-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.gi-row:last-child{border-bottom:none}
.gi-key{color:var(--text2)}.gi-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:11px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;
  backdrop-filter:blur(20px);border:1px solid;max-width:320px;
  animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);
}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.toast.info{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.3);color:var(--accent)}
.toast.success{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.3);color:var(--green)}
.toast.error{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.3);color:var(--red)}

/* ── 로딩/빈 상태 ── */
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
.empty-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--text2);font-size:13px;text-align:center;gap:8px}
.empty-box .ei{font-size:36px}

/* ── AI 분석 패널 ── */
.ai-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.ai-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(129,140,248,.08),rgba(56,189,248,.05));
}
.ai-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text)}
.ai-badge{
  font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;
  background:linear-gradient(135deg,rgba(129,140,248,.2),rgba(56,189,248,.15));
  color:var(--accent2);border:1px solid rgba(129,140,248,.3);letter-spacing:.05em;
}
.ai-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#000;border:none;cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all .2s;
  box-shadow:0 0 14px rgba(129,140,248,.3);
}
.ai-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(129,140,248,.45)}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-btn .spin-ico{animation:spin .8s linear infinite;display:inline-block}

.ai-body{padding:16px}
.ai-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 16px;text-align:center;gap:8px;color:var(--text2);
}
.ai-empty .aei{font-size:32px;margin-bottom:4px}
.ai-empty p{font-size:12px;line-height:1.6}

/* AI 결과 카드들 */
.ai-result{display:flex;flex-direction:column;gap:10px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.ai-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.ai-section-title{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.ai-section-title .sicon{font-size:13px}
.ai-text{font-size:12px;line-height:1.75;color:var(--text)}
.ai-text strong{color:var(--accent);font-weight:700}
.ai-text em{color:var(--yellow);font-style:normal;font-weight:600}

/* 지표 그리드 */
.ai-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ai-metric{
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;text-align:center;
}
.am-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;line-height:1}
.am-lbl{font-size:10px;color:var(--text2);margin-top:4px}

/* 추천 태그 */
.ai-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ai-tag{
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;
  border:1px solid;cursor:default;
}
.tag-blue{background:rgba(56,189,248,.1);color:var(--accent);border-color:rgba(56,189,248,.25)}
.tag-green{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.25)}
.tag-yellow{background:rgba(251,191,36,.1);color:var(--yellow);border-color:rgba(251,191,36,.25)}
.tag-red{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.25)}
.tag-purple{background:rgba(129,140,248,.1);color:var(--accent2);border-color:rgba(129,140,248,.25)}

/* AI 스트리밍 커서 */
.ai-cursor{display:inline-block;width:2px;height:13px;background:var(--accent);margin-left:2px;animation:blink-cur .7s ease-in-out infinite;vertical-align:middle}
@keyframes blink-cur{0%,100%{opacity:1}50%{opacity:0}}

/* 히스토리 */
.ai-history{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.ai-history-title{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:6px;letter-spacing:.05em}
.ai-hist-item{
  font-size:11px;color:var(--text2);padding:5px 8px;border-radius:6px;
  cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px;
}
.ai-hist-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.ai-hist-item .hi-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* 반응형 */
@media(max-width:1200px){
  .main-grid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .search-section{grid-template-columns:1fr}
  nav{padding:10px 14px}
  .cong-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .fav-grid{grid-template-columns:1fr 1fr}
}
